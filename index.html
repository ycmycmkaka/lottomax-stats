<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Lotto Max 深度走勢分析表 📈</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007aff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #007aff; color: white; padding: 12px; font-size: 14px; position: sticky; top:0; }
        td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; font-size: 13px; }
        .num-ball { display: inline-block; width: 26px; height: 26px; line-height: 26px; border-radius: 50%; background: #eee; margin: 2px; font-weight: bold; border: 1px solid #ccc; }
        .tag { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .consec-yes { background: #e6f4ea; color: #1e8e3e; }
        .repeat-high { background: #fce8e6; color: #d93025; }
        .zone-label { background: #e8f0fe; color: #1967d2; }
    </style>
</head>
<body>
<div class="container">
    <h2>Lotto Max 深度走勢分析表</h2>
    <div id="table-container">數據讀取中...</div>
</div>
<script>
Papa.parse("data.csv", {
    download: true,
    header: true,
    complete: function(results) {
        let html = '<table><thead><tr><th>日期</th><th>號碼</th><th>單雙</th><th>連續</th><th>重複</th><th>Zone</th></tr></thead><tbody>';
        
        results.data.forEach(row => {
            // 統一將 Key 變做細寫方便配對
            let lowerRow = {};
            Object.keys(row).forEach(k => lowerRow[k.toLowerCase().trim()] = row[k]);

            // 搵號碼
            let nums = [];
            Object.keys(lowerRow).forEach(k => {
                if((k.startsWith('n') || k.includes('ball')) && !isNaN(parseInt(lowerRow[k]))) {
                    if(nums.length < 7) nums.push(parseInt(lowerRow[k]));
                }
            });
            nums.sort((a,b) => a-b);
            if(nums.length < 7) return;

            let balls = nums.map(n => `<span class="num-ball">${n}</span>`).join('');
            let oe = lowerRow['odd_even'] || '-';
            let consec = lowerRow['consecutive'] === 'Yes' ? '<span class="tag consec-yes">Yes</span>' : 'No';
            let repeats = parseInt(lowerRow['repeats']) >= 2 ? `<span class="tag repeat-high">${lowerRow['repeats']}個</span>` : (lowerRow['repeats'] || '0') + '個';
            let zone = lowerRow['zone'] || '-';
            let date = lowerRow['draw date'] || lowerRow['date'] || '-';

            html += `<tr><td>${date}</td><td style="text-align:left;">${balls}</td><td><strong>${oe}</strong></td><td>${consec}</td><td>${repeats}</td><td><span class="tag zone-label">${zone}</span></td></tr>`;
        });
        document.getElementById('table-container').innerHTML = html + '</tbody></table>';
    }
});
</script>
</body>
</html>
