<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Max 走勢分析</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --border: #dbe4f0;
      --text: #122033;
      --muted: #5f7087;
      --blue: #1f7cff;
      --blue-soft: rgba(31, 124, 255, 0.16);
      --amber: #f59e0b;
      --green: #20a34a;
      --red: #e3342f;
      --track: #d9dee7;
      --shadow: 0 10px 28px rgba(18, 32, 51, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
      color: var(--text);
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.02em;
    }

    .subline {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #1f7cff, #21b3ff);
      border-radius: 14px;
      padding: 13px 18px;
      box-shadow: 0 8px 18px rgba(31, 124, 255, 0.22);
      white-space: nowrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      word-break: break-word;
    }

    .layout-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .layout-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .layout-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .chart-box {
      height: 340px;
    }

    .balls-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .ball-stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 10px;
      text-align: center;
    }

    .ball-number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      color: var(--blue);
    }

    .ball-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .analysis-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .analysis-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 4px solid #e5eefb;
    }

    .analysis-row {
      display: grid;
      grid-template-columns: 1fr 150px 56px;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 700;
      color: #4d5e74;
    }

    .bar-track {
      height: 18px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .blue { background: var(--blue); }
    .green { background: var(--green); }
    .red { background: var(--red); }

    .table-topline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .table-note {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 1100px;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e8eef6;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #f8fbff;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    .num-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 290px;
    }

    .num-badge {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--blue-soft);
      color: var(--blue);
      border: 1px solid rgba(31, 124, 255, 0.18);
      font-weight: 800;
      font-size: 13px;
    }

    .table-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .table-pill.green {
      background: rgba(32, 163, 74, 0.14);
      color: #17833a;
    }

    .table-pill.red {
      background: rgba(227, 52, 47, 0.14);
      color: #c92d28;
    }

    .table-pill.blue {
      background: rgba(31, 124, 255, 0.12);
      color: #1f7cff;
    }

    .prize-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
      background: rgba(245, 158, 11, 0.14);
      color: #b66a00;
      border: 1px solid rgba(245, 158, 11, 0.24);
    }

    .prize-pill.reset {
      background: rgba(227, 52, 47, 0.14);
      color: #c92d28;
      border-color: rgba(227, 52, 47, 0.22);
    }

    .prize-pill.max {
      background: rgba(32, 163, 74, 0.14);
      color: #17833a;
      border-color: rgba(32, 163, 74, 0.22);
    }

    .empty-note {
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    @media (max-width: 1280px) {
      .layout-3 { grid-template-columns: 1fr 1fr; }
      .layout-4 { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 1024px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .layout-2, .layout-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .container { padding: 14px; }
      .header { flex-direction: column; align-items: stretch; }
      .metrics { grid-template-columns: 1fr; }
      .layout-4 { grid-template-columns: 1fr; }
      .balls-grid { grid-template-columns: repeat(3, 1fr); }
      .analysis-row { grid-template-columns: 1fr 120px 52px; }
      h1 { font-size: 28px; }
      .metric-value { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Lotto Max 走勢分析</h1>
        <div class="subline" id="status">載入中…</div>
      </div>
      <button id="reloadBtn" class="btn">重新載入資料</button>
    </div>

    <div class="metrics">
      <div class="card">
        <div class="metric-label">總期數</div>
        <div class="metric-value" id="totalDraws">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最後更新時間</div>
        <div class="metric-value" id="lastUpdated">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最熱門主號碼</div>
        <div class="metric-value" id="topMain">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最高常見分區</div>
        <div class="metric-value" id="topZone">-</div>
      </div>
    </div>

    <div class="layout-3">
      <div class="card">
        <h2 class="section-title">最熱門主號碼 Top 5</h2>
        <div class="balls-grid" id="hotMainNumbers"></div>
      </div>
      <div class="card">
        <h2 class="section-title">最冷門主號碼 Top 5</h2>
        <div class="balls-grid" id="coldMainNumbers"></div>
      </div>
      <div class="card">
        <h2 class="section-title">連續 15 期或以上未開號碼</h2>
        <div class="balls-grid" id="missingLongGrid"></div>
      </div>
    </div>

    <div class="layout-4">
      <div class="analysis-card">
        <h2 class="analysis-title">單雙分布 (Top 4)</h2>
        <div id="oddEvenDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">連續號碼數量</h2>
        <div id="consecutiveDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">上期重複</h2>
        <div id="repeatDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">涵蓋分區</h2>
        <div id="zoneDist"></div>
      </div>
    </div>

    <div class="card">
      <div class="table-topline">
        <h2 class="section-title" style="margin-bottom:0;">最近開獎記錄</h2>
        <div class="table-note" id="tableNote">顯示全部記錄</div>
      </div>
      <div class="table-wrap" id="table-container"></div>
    </div>
  </div>

  <script>
    let csvUrl = "data.csv?t=" + new Date().getTime();

    let lastUpdatedDisplay = "-";

    function setStatusText(text) {
      document.getElementById("status").textContent = text;
    }

    function formatDateTime(d) {
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function renderMetricCards(totalDraws, hotNumbers, zoneStats) {
      document.getElementById("totalDraws").textContent = totalDraws;
      document.getElementById("lastUpdated").textContent = lastUpdatedDisplay;

      const topMain = hotNumbers[0];
      document.getElementById("topMain").textContent = topMain ? `${topMain.num} (${topMain.value}次)` : "-";

      const topZone = Object.entries(zoneStats).sort((a, b) => b[1] - a[1])[0];
      document.getElementById("topZone").textContent = topZone ? topZone[0] : "-";
    }

    function renderProgressRows(containerId, items) {
      const container = document.getElementById(containerId);
      container.innerHTML = items.map(item => `
        <div class="analysis-row">
          <div>${item.label}</div>
          <div class="bar-track">
            <div class="bar-fill ${item.color}" style="width:${item.pct}%"></div>
          </div>
          <div>${item.pct}%</div>
        </div>
      `).join("");
    }

    function renderNumberBoxes(containerId, items, suffix, emptyText = "") {
      const el = document.getElementById(containerId);
      if (!items.length) {
        el.innerHTML = `<div class="empty-note">${emptyText}</div>`;
        return;
      }

      el.innerHTML = items.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">${item.value}${suffix}</div>
        </div>
      `).join("");
    }

    function calculateMissingStreaks(rows) {
      const results = [];

      for (let num = 1; num <= 50; num++) {
        let missing = 0;
        let found = false;

        for (let i = 0; i < rows.length; i++) {
          const rowNums = [];
          for (let j = 1; j <= 7; j++) {
            const v = parseInt(rows[i]['n' + j]);
            if (!isNaN(v)) rowNums.push(v);
          }

          if (rowNums.includes(num)) {
            found = true;
            break;
          }
          missing += 1;
        }

        results.push({
          num,
          value: found ? missing : rows.length
        });
      }

      return results;
    }

    function percent(count, total) {
      return total ? Math.round((count / total) * 100) : 0;
    }

    function parsePrize(rawPrize) {
      rawPrize = (rawPrize || '-').trim();
      let prize = rawPrize;
      let className = "prize-pill";

      if (rawPrize !== '-') {
        const numStr = rawPrize.replace(/[^0-9]/g, '');
        const numVal = parseInt(numStr);

        if (!isNaN(numVal)) {
          if (numVal === 10 || numVal === 10000000) {
            className += " reset";
            prize = "$10M";
          } else if ((numVal >= 50 && numVal <= 1000) || numVal >= 50000000) {
            className += " max";
            if (numVal >= 50 && numVal <= 1000) prize = '$' + numVal + 'M';
          } else if (numVal > 10 && numVal < 50) {
            prize = '$' + numVal + 'M';
          }
        }
      }

      return `<span class="${className}">${prize}</span>`;
    }

    function loadLastUpdated() {
      return fetch(csvUrl, { method: 'HEAD' })
        .then(res => {
          const lastMod = res.headers.get('Last-Modified');
          if (lastMod) {
            const d = new Date(lastMod);
            lastUpdatedDisplay = formatDateTime(d);
            setStatusText(`最後更新時間：${lastUpdatedDisplay}`);
          } else {
            lastUpdatedDisplay = "自動抓取";
            setStatusText("數據由系統自動抓取");
          }
        })
        .catch(() => {
          lastUpdatedDisplay = "自動抓取";
          setStatusText("數據由系統自動抓取");
        });
    }

    function renderDashboard(data) {
      let totalDraws = 0;
      let stats = {
        oe: {},
        consec: {},
        repeats: { '0個': 0, '1個': 0, '2個': 0, '3個或以上': 0 },
        zones: {}
      };

      let mainFreq = {};
      for (let i = 1; i <= 50; i++) mainFreq[i] = 0;

      data.forEach(row => {
        if (!row.n1) return;
        totalDraws++;

        for (let i = 1; i <= 7; i++) {
          const v = parseInt(row['n' + i]);
          if (!isNaN(v) && mainFreq[v] !== undefined) mainFreq[v] += 1;
        }

        const oe = row['odd_even'];
        if (oe) stats.oe[oe] = (stats.oe[oe] || 0) + 1;

        const consecVal = row['consecutive'] || '0 個連續';
        stats.consec[consecVal] = (stats.consec[consecVal] || 0) + 1;

        const rCount = parseInt(row['repeats']) || 0;
        if (rCount === 0) stats.repeats['0個']++;
        else if (rCount === 1) stats.repeats['1個']++;
        else if (rCount === 2) stats.repeats['2個']++;
        else stats.repeats['3個或以上']++;

        const zoneStr = row['zone'];
        if (zoneStr) {
          const match = zoneStr.match(/^(\d)/);
          if (match) {
            const zName = match[1] + '個區';
            stats.zones[zName] = (stats.zones[zName] || 0) + 1;
          }
        }
      });

      const hotNumbers = Object.entries(mainFreq)
        .map(([num, count]) => ({ num: Number(num), value: count }))
        .sort((a, b) => b.value - a.value || a.num - b.num)
        .slice(0, 5);

      const coldNumbers = Object.entries(mainFreq)
        .map(([num, count]) => ({ num: Number(num), value: count }))
        .sort((a, b) => a.value - b.value || a.num - b.num)
        .slice(0, 5);

      const validRows = data.filter(r => r.n1);
      const missing15Plus = calculateMissingStreaks(validRows)
        .filter(item => item.value >= 15)
        .sort((a, b) => b.value - a.value || a.num - b.num);

      renderMetricCards(totalDraws, hotNumbers, stats.zones);

      renderNumberBoxes("hotMainNumbers", hotNumbers, "次");
      renderNumberBoxes("coldMainNumbers", coldNumbers, "次");
      renderNumberBoxes("missingLongGrid", missing15Plus, "期未開", "目前冇主號碼連續 15 期或以上未開");

      const oeItems = Object.entries(stats.oe)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 4)
        .map(([label, count]) => ({ label, pct: percent(count, totalDraws), color: "blue" }));
      renderProgressRows("oddEvenDist", oeItems);

      const consecOrder = ["0 個連續", "1 個連續", "2 個連續", "3 個連續", "4 個連續", "5 個連續", "6 個連續"];
      const consecItems = consecOrder
        .filter(label => stats.consec[label] !== undefined)
        .map(label => ({
          label: label.replace(" ", ""),
          pct: percent(stats.consec[label], totalDraws),
          color: label === "0 個連續" ? "red" : "green"
        }));
      renderProgressRows("consecutiveDist", consecItems);

      const repeatItems = [
        { label: "0個", count: stats.repeats["0個"] || 0 },
        { label: "1個", count: stats.repeats["1個"] || 0 },
        { label: "2個", count: stats.repeats["2個"] || 0 },
        { label: "3個或以上", count: stats.repeats["3個或以上"] || 0 }
      ].map(item => ({
        label: item.label,
        pct: percent(item.count, totalDraws),
        color: "blue"
      }));
      renderProgressRows("repeatDist", repeatItems);

      const zoneItems = [5, 4, 3, 2, 1]
        .filter(z => stats.zones[`${z}個區`] !== undefined)
        .map(z => ({
          label: `${z}個區`,
          pct: percent(stats.zones[`${z}個區`], totalDraws),
          color: "blue"
        }));
      renderProgressRows("zoneDist", zoneItems);
    }

    function renderTable(data) {
      const validRows = data.filter(r => r.n1);
      document.getElementById("tableNote").textContent = `顯示全部 ${validRows.length} 期`;

      let html = '<table><thead><tr>';
      html += '<th>開彩日期</th><th>開彩號碼 (7 Balls)</th><th>獎金 (Jackpot)</th><th>單雙</th><th>連續號碼</th><th>上期重複</th><th>Zone 分區</th>';
      html += '</tr></thead><tbody>';

      validRows.forEach(row => {
        let ballsHtml = '<div class="num-row">';
        for (let i = 1; i <= 7; i++) {
          ballsHtml += `<span class="num-badge">${row['n' + i]}</span>`;
        }
        ballsHtml += '</div>';

        const date = row['date'] || '-';
        const oe = row['odd_even'] || '-';

        const consecVal = row['consecutive'] || '0 個連續';
        const consecHtml = consecVal !== '0 個連續'
          ? `<span class="table-pill green">${consecVal.replace(" ", "")}</span>`
          : `<span class="table-pill red">${consecVal.replace(" ", "")}</span>`;

        const repeatCount = parseInt(row['repeats']) || 0;
        const repeatsHtml = repeatCount >= 2
          ? `<span class="table-pill red">${repeatCount}個</span>`
          : (repeatCount === 1
              ? `<span class="table-pill blue">1個</span>`
              : `<span class="table-pill green">0個</span>`);

        const zone = row['zone'] || '-';
        const zoneHtml = `<span class="table-pill blue">${zone}</span>`;
        const prizeHtml = parsePrize(row['prize']);

        html += `<tr>
          <td>${date}</td>
          <td>${ballsHtml}</td>
          <td>${prizeHtml}</td>
          <td><strong>${oe}</strong></td>
          <td>${consecHtml}</td>
          <td>${repeatsHtml}</td>
          <td>${zoneHtml}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('table-container').innerHTML = html;
    }

    function loadAll() {
      csvUrl = "data.csv?t=" + new Date().getTime();

      loadLastUpdated().then(() => {
        Papa.parse(csvUrl, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            try {
              let data = results.data;
              if (data.length === 0 || !data[0].n1) {
                document.getElementById('table-container').innerHTML = "<p style='text-align:center; color:red;'>未搵到數據，請稍後再試。</p>";
                return;
              }

              renderDashboard(data);
              renderTable(data);
            } catch (error) {
              document.getElementById('table-container').innerHTML = `<p style="color:red; text-align:center; padding:20px; background:#fff; border: 1px solid red;"><b>網頁發生錯誤：</b><br>${error.message}</p>`;
            }
          },
          error: function(err) {
            document.getElementById('table-container').innerHTML = `<p style="color:red; text-align:center; padding:20px; background:#fff; border: 1px solid red;"><b>讀取 CSV 失敗：</b><br>${err}</p>`;
          }
        });
      });
    }

    document.getElementById("reloadBtn").addEventListener("click", loadAll);

    loadAll();
  </script>
</body>
</html>
