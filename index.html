<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Max 數據分析儀表板 📊</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #007aff; }
        .stat-card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .number-tag { display: inline-block; background: #007aff; color: white; padding: 5px 12px; border-radius: 20px; margin: 4px; font-weight: bold; }
        #error-msg { color: red; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lotto Max 歷史數據統計</h1>
    <div id="loading">📊 正在讀取 data.csv...</div>
    <div id="error-msg">❌ 讀取失敗：搵唔到 data.csv 或者格式唔啱。</div>
    
    <div id="dashboard" style="display: none;">
        <div class="stat-card">
            <h3>🔥 最旺號碼 (出現次數最多)</h3>
            <div id="hot-numbers"></div>
        </div>
        
        <div class="stat-card">
            <h3>⚖️ 整體單雙分佈</h3>
            <div id="even-odd-text" style="font-size: 1.2em; font-weight: bold;"></div>
        </div>

        <div id="debug-info" style="font-size: 0.8em; color: #999; margin-top: 20px;"></div>
    </div>
</div>

<script>
// 讀取 CSV
Papa.parse("data.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        if (results.data.length === 0) {
            showError("CSV 入面無數據呀！");
            return;
        }
        processData(results.data);
    },
    error: function(err) {
        showError("搵唔到 data.csv，請檢查檔案名係咪正確。");
    }
});

function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').innerText = msg;
}

function processData(data) {
    let numFreq = {};
    let odds = 0, evens = 0;
    let rowCount = 0;

    data.forEach(row => {
        // 智能掃描：只要個 Value 係 1-50 嘅數字就攞出嚟
        Object.values(row).forEach(val => {
            let n = parseInt(val);
            if (!isNaN(n) && n >= 1 && n <= 50) {
                numFreq[n] = (numFreq[n] || 0) + 1;
                if (n % 2 === 0) evens++; else odds++;
            }
        });
        rowCount++;
    });

    if (Object.keys(numFreq).length === 0) {
        showError("讀到檔案，但搵唔到任何 1-50 嘅號碼。請檢查 CSV 格式。");
        return;
    }

    display(numFreq, odds, evens, rowCount);
}

function display(numFreq, odds, evens, rowCount) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    // 1. 顯示最旺號碼
    const sorted = Object.entries(numFreq).sort((a, b) => b[1] - a[1]).slice(0, 15);
    const hotDiv = document.getElementById('hot-numbers');
    sorted.forEach(([num, count]) => {
        hotDiv.innerHTML += `<span class="number-tag">${num} <small>(${count}次)</small></span>`;
    });

    // 2. 單雙
    const total = odds + evens;
    document.getElementById('even-odd-text').innerHTML = `
        單數: ${((odds/total)*100).toFixed(1)}% | 
        雙數: ${((evens/total)*100).toFixed(1)}%
    `;

    document.getElementById('debug-info').innerText = `成功分析咗 ${rowCount} 期數據。`;
}
</script>
</body>
</html>
