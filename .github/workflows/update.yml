name: Lotto Max Auto Scraper

on:
  schedule:
    # 逢星期三同六自動上網抓取最新開彩
    - cron: '0 8 * * 3,6'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install pandas requests beautifulsoup4
      - name: Run Scraper
        run: python scraper.py
      - name: Commit Results
        run: |
          git config --global user.name 'Scraper Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add data.csv
          git commit -m "Auto-fetch: Latest Lotto Max results" || exit 0
          git push
